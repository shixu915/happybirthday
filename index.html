<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>祝小陈生日快乐!</title>
    <!-- Removed "./css/" because files are in the same directory -->
    <link type="text/css" rel="stylesheet" href="default.css">
    <script type="text/javascript" src="jquery.min.js"></script>
    <script type="text/javascript" src="jscex.min.js"></script>
    <script type="text/javascript" src="jscex-parser.js"></script>
    <script type="text/javascript" src="jscex-jit.js"></script>
    <script type="text/javascript" src="jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="jscex-async.min.js"></script>
    <script type="text/javascript" src="jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="functions.js" charset="utf-8"></script>
    <script type="text/javascript" src="love.js" charset="utf-8"></script>
    <style type="text/css">
        #code { color: #FF0000; }
        .green-text { color: #33CC00; }
        .say h1 { font-size: 24px; margin: 0; display: inline; }
    </style>
</head>
<body>
    <!-- ⚠️ Note: Removed <audio> because love.jpg is an image, not a song. -->
    <div id="main">
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say"><h1>我希望有个如你一般的人</h1></span><br><br>
                    <span class="say">我希望有个如你一般的人。</span><br><br>
                    <span class="say">如这山间清晨一般明亮清爽，</span><br><br>
                    <span class="say">温暖而不炙热，覆盖我所有肌肤。</span><br><br>
                    <span class="say"><span class="space"></span> -- 石晨旭--</span><br><br>
                    <span class="say"><h1>祝小陈生日快乐!</h1></span><br>
                </div>
            </div>
            <div id="clock-box"><span class="green-text">距离我们相识，已经是……</span><div id="clock"></div></div>
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
    </div>
    <script>
    (function(){
        var canvas = $('#canvas')[0]; // Fixed jQuery element context selector bug
        if (!canvas || !canvas.getContext) { return; }
        var width = $(canvas).width(), height = $(canvas).height();
        
        var opts = {
            seed: { x: width / 2 - 20, color: "rgb(190, 26, 37)", scale: 2 },
            branch: [ [535, 680, 570, 250, 500, 200, 30, 100, [[540, 500, 455, 417, 340, 400, 13, 100, []], [550, 445, 600, 356, 680, 345, 12, 100, []], [546, 397, 413, 247, 328, 244, 9, 80, []], [546, 357, 608, 252, 678, 221, 6, 100, []]]] ],
            bloom: { num: 700, width: 1080, height: 650 },
            footer: { width: 1200, height: 5, speed: 10 }
        };
        var tree = new Tree(canvas, width, height, opts), seed = tree.seed, foot = tree.footer, hold = 1;
        
        $(canvas).click(function(e) {
            var offset = $(canvas).offset(), x = e.pageX - offset.left, y = e.pageY - offset.top;
            if (seed.hover(x, y)) { 
                hold = 0; 
                $(canvas).unbind("click"); 
                $(canvas).unbind("mousemove"); 
                $(canvas).removeClass('hand');
            }
        }).mousemove(function(e){
            var offset = $(canvas).offset(), x = e.pageX - offset.left, y = e.pageY - offset.top;
            $(canvas).toggleClass('hand', seed.hover(x, y));
        });

        var seedAnimate = eval(Jscex.compile("async", function () { seed.draw(); while (hold) { $await(Jscex.Async.sleep(10)); } while (seed.canScale()) { seed.scale(0.95); $await(Jscex.Async.sleep(10)); } while (seed.canMove()) { seed.move(0, 2); foot.draw(); $await(Jscex.Async.sleep(10)); } }));
        var growAnimate = eval(Jscex.compile("async", function () { do { tree.grow(); $await(Jscex.Async.sleep(10)); } while (tree.canGrow()); }));
        var flowAnimate = eval(Jscex.compile("async", function () { do { tree.flower(2); $await(Jscex.Async.sleep(10)); } while (tree.canFlower()); }));
        var moveAnimate = eval(Jscex.compile("async", function () { tree.snapshot("p1", 240, 0, 610, 680); while (tree.move("p1", 500, 0)) { foot.draw(); $await(Jscex.Async.sleep(10)); } foot.draw(); tree.snapshot("p2", 500, 0, 610, 680); $(canvas).parent().css("background", "url(" + tree.toDataURL('image/png') + ")"); $(canvas).css("background", "#ffe"); $await(Jscex.Async.sleep(300)); $(canvas).css("background", "none"); }));
        var jumpAnimate = eval(Jscex.compile("async", function () { while (true) { tree.ctx.clearRect(0, 0, width, height); tree.jump(); foot.draw(); $await(Jscex.Async.sleep(25)); } }));
        var textAnimate = eval(Jscex.compile("async", function () { var together = new Date(); together.setFullYear(2025, 4, 15); together.setHours(0); together.setMinutes(33); $("#code").show().typewriter(); $("#clock-box").fadeIn(500); while (true) { timeElapse(together); $await(Jscex.Async.sleep(1000)); } }));
        var runAsync = eval(Jscex.compile("async", function () { $await(seedAnimate()); $await(growAnimate()); $await(flowAnimate()); $await(moveAnimate()); textAnimate().start(); $await(jumpAnimate()); }));
        runAsync().start();
    })();
    </script>
</body>
</html>
