<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>祝小陈生日快乐!</title>     
    <link type="text/css" rel="stylesheet" href="./css/default.css">
    <script type="text/javascript" src="./css/jquery.min.js"></script>
    <script type="text/javascript" src="./css/jscex.min.js"></script>
    <script type="text/javascript" src="./css/jscex-async.min.js"></script>
    <script type="text/javascript" src="./css/functions.js" charset="utf-8"></script>
    <script type="text/javascript" src="./css/love.js" charset="utf-8"></script>
    <style type="text/css">
        #code { color: #FF0000; }
        .green-text { color: #33CC00; }
        .say h1 { font-size: 24px; margin: 0; display: inline; }
    </style>
</head>
<body>
    <!-- Audio autoplay bypass strategy: Audio starts on user click event -->
    <audio id="bgm" loop>
        <source src="music/love.mp3" type="audio/mp3" />
    </audio>  

    <div id="main">
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say"><h1>我希望有个如你一般的人</h1></span><br><br>
                    <span class="say">我希望有个如你一般的人。</span><br><br>    
                    <span class="say">如这山间清晨一般明亮清爽，</span><br><br>
                    <span class="say">如奔赴古城道路上阳光一般的人，</span><br><br>
                    <span class="say">温暖而不炙热，覆盖我所有肌肤。</span><br><br>
                    <span class="say">由起点到夜晚，由山野到书房，一切问题的答案都很简单。</span><br><br>
                    <span class="say">我希望有个如你一般的人，贯彻未来，数遍生命的公路牌。</span><br><br>
                    <span class="say"><span class="space"></span> -- 石晨旭--</span><br><br>
                    <span class="say"><h1>祝小陈生日快乐!</h1></span><br>
                </div>
            </div>
            <div id="clock-box">
                <span class="green-text">距离我们相识，已经是……</span>
                <div id="clock"></div>
            </div>
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
    </div>
    
    <script>
    (function(){
        var canvas = $('#canvas');
        if (!canvas[0].getContext) return;

        var width = canvas.width();
        var height = canvas.height();        
        canvas.attr("width", width);
        canvas.attr("height", height);
        
        // ... (Tree configuration options 'opts' remain as original)
        var opts = { /* ... */ };

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        // Click to start animation and audio
        canvas.click(function(e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0; 
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
                var audio = document.getElementById('bgm');
                if (audio) audio.play();
            }
        }).mousemove(function(e){
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        // ... (Animation functions: seedAnimate, growAnimate, flowAnimate, moveAnimate, jumpAnimate)
        // ... (As in original)

        var textAnimate = eval(Jscex.compile("async", function () {
            var together = new Date();
            // Note: Months are 0-indexed in JS (0 = Jan, 4 = May)
            together.setFullYear(2025, 5, 15); // May 15, 2025
            together.setHours(0);            
            together.setMinutes(33);          
            together.setSeconds(0);         
            together.setMilliseconds(0);        

            $("#code").show().typewriter();
            $("#clock-box").fadeIn(500);
            while (true) {
                timeElapse(together);
                $await(Jscex.Async.sleep(1000));
            }
        }));

        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());
            textAnimate().start();
            $await(jumpAnimate());
        }));

        runAsync().start();
    })();
    </script>
</body>
</html>
